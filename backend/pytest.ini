[pytest]
# Run from the backend/ directory. `pythonpath = .` makes the `app` package
# importable; `asyncio_mode = auto` lets pytest-asyncio run async tests.
# Fixtures/tests share one session-scoped event loop so the session-scoped DB
# engine fixture (asyncpg) isn't torn across loops.
pythonpath = .
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
asyncio_default_test_loop_scope = session
testpaths = tests
